<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carlover — API Tester</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #222538;
    --border: #2e3150;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --text: #e2e8f0;
    --muted: #8892a4;
    --success: #22c55e;
    --warn: #f59e0b;
    --error: #ef4444;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }

  #health-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  #health-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  #health-dot.ok { background: var(--success); }
  #health-dot.err { background: var(--error); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    padding: 20px 24px;
    max-width: 1600px;
    margin: 0 auto;
  }

  @media (max-width: 1200px) {
    .layout { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-header svg { opacity: 0.7; }

  .card-body { padding: 18px; display: flex; flex-direction: column; gap: 12px; }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 500;
  }

  textarea, input[type="text"], input[type="url"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    transition: border-color 0.15s;
  }

  textarea:focus, input:focus {
    border-color: var(--accent);
  }

  textarea { min-height: 90px; }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 7px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  button.secondary {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  button.secondary:hover { color: var(--text); border-color: var(--accent); }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 7px;
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(99,102,241,0.05);
  }
  .drop-zone input[type="file"] { display: none; }

  .drop-zone-preview {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text);
  }
  .drop-zone-preview img {
    width: 48px; height: 48px;
    object-fit: cover;
    border-radius: 5px;
    border: 1px solid var(--border);
  }

  .result-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 14px;
    min-height: 120px;
    font-size: 12px;
    display: none;
  }
  .result-area.visible { display: block; }

  .answer-box {
    background: rgba(99,102,241,0.08);
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: 7px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .badge.green { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--success); }
  .badge.amber { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: var(--warn); }
  .badge.red { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--error); }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 12px;
  }

  .clarification-box {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 7px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--warn);
  }

  .sources-list, .observations-list, .findings-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .source-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .raw-json {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 11px;
    white-space: pre;
    overflow-x: auto;
    color: var(--muted);
    margin-top: 6px;
    max-height: 200px;
    overflow-y: auto;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs {
    display: flex;
    gap: 2px;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tab {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-panel { display: none; }
  .tab-panel.active { display: flex; flex-direction: column; gap: 12px; padding: 18px; }

  .conf-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .conf-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s;
  }

  .image-preview-large {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    display: none;
  }
  .image-preview-large.visible { display: block; }

  .warning-light-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--error);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  .quality-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .quality-good { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
  .quality-poor { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: var(--warn); }
  .quality-unusable { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--error); }

  .api-url-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .api-url-bar label { color: var(--muted); white-space: nowrap; }
  .api-url-bar input {
    flex: 1;
    max-width: 340px;
    padding: 5px 10px;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
  }

  details summary {
    cursor: pointer;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    user-select: none;
  }
  details summary:hover { color: var(--text); }
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v5"/>
    <path d="M14 17a2 2 0 100 4 2 2 0 000-4zm7 0a2 2 0 100 4 2 2 0 000-4z"/>
    <path d="M12 17h3m4 0h2"/>
  </svg>
  <h1>Car<span>lover</span> — API Tester</h1>

  <div id="health-badge">
    <div id="health-dot"></div>
    <span id="health-text">checking…</span>
  </div>
</header>

<div class="api-url-bar">
  <label for="api-base">API base:</label>
  <input id="api-base" type="text" value="" placeholder="http://localhost:8000" />
  <button class="secondary" onclick="checkHealth()" style="padding:5px 12px;font-size:12px;">
    Ping
  </button>
</div>

<div class="layout">

  <!-- ── CHAT ── -->
  <div class="card">
    <div class="card-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      Chat — POST /chat
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('chat','basic')">Basic</div>
      <div class="tab" onclick="switchTab('chat','vehicle')">+ Vehicle</div>
      <div class="tab" onclick="switchTab('chat','image')">+ Image</div>
    </div>

    <div id="chat-tab-basic" class="tab-panel active">
      <label for="chat-query">Query</label>
      <textarea id="chat-query" placeholder="My Golf 7 makes a grinding noise when braking…" rows="4"></textarea>
    </div>

    <div id="chat-tab-vehicle" class="tab-panel">
      <label for="chat-query-v">Query</label>
      <textarea id="chat-query-v" placeholder="My car makes a grinding noise when braking…" rows="3"></textarea>
      <div class="row">
        <div>
          <label>Make</label>
          <input id="v-make" type="text" placeholder="VW" />
        </div>
        <div>
          <label>Model</label>
          <input id="v-model" type="text" placeholder="Golf" />
        </div>
        <div>
          <label>Year</label>
          <input id="v-year" type="text" placeholder="2019" />
        </div>
      </div>
      <div>
        <label>Variant (optional)</label>
        <input id="v-variant" type="text" placeholder="GTI" />
      </div>
    </div>

    <div id="chat-tab-image" class="tab-panel">
      <label for="chat-query-i">Query</label>
      <textarea id="chat-query-i" placeholder="What's wrong with my dashboard?" rows="3"></textarea>
      <label>Image URL</label>
      <input id="chat-image-url" type="url" placeholder="https://… or leave blank to use Image Analyzer" />
    </div>

    <div style="padding:0 18px 18px;">
      <button id="chat-btn" onclick="sendChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Send
      </button>
    </div>

    <div id="chat-result" class="result-area" style="margin:0 18px 18px;"></div>
  </div>

  <!-- ── VEHICLE LOOKUP ── -->
  <div class="card">
    <div class="card-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Vehicle Lookup — POST /vehicle/lookup
    </div>

    <div style="padding:18px;display:flex;flex-direction:column;gap:12px;">
      <div style="font-size:12px;color:var(--muted);">
        Typos and missing make are OK — e.g. <em>"Gollf"</em>, <em>"Polo"</em> without a brand.
      </div>

      <div class="row">
        <div>
          <label>Make (optional)</label>
          <input id="vl-make" type="text" placeholder="VW, BMW, Vollkswagen…" />
        </div>
        <div>
          <label>Model *</label>
          <input id="vl-model" type="text" placeholder="Golf, Gollf, 3er…" />
        </div>
        <div>
          <label>Year (optional)</label>
          <input id="vl-year" type="text" placeholder="2019" />
        </div>
      </div>

      <button id="vl-btn" onclick="sendVehicleLookup()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Lookup
      </button>

      <div id="vl-result" class="result-area"></div>
    </div>
  </div>

  <!-- ── IMAGE ANALYSIS ── -->
  <div class="card">
    <div class="card-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      Image Analysis — POST /image/analyze
    </div>

    <div style="padding:18px;display:flex;flex-direction:column;gap:12px;">

      <label>Image source</label>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"
           ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)" />
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 8px;display:block;opacity:0.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Drop an image here or click to upload</span>
        <div id="file-name" class="drop-zone-preview" style="display:none;justify-content:center;">
          <img id="file-thumb" src="" alt="" />
          <span id="file-label"></span>
        </div>
      </div>

      <div style="text-align:center;font-size:12px;color:var(--muted);">— or use a URL —</div>

      <div>
        <label>Image URL</label>
        <input id="img-url" type="url" placeholder="https://example.com/car.jpg" oninput="clearFileSelection()" />
      </div>

      <img id="img-preview" class="image-preview-large" src="" alt="preview" />

      <div>
        <label>Context hint (optional)</label>
        <input id="img-context" type="text" placeholder="dashboard warning lights" />
      </div>

      <button id="img-btn" onclick="sendImageAnalysis()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Analyze
      </button>

      <div id="img-result" class="result-area"></div>
    </div>
  </div>

</div>

<script>
// ──────────────────────────────────────────────
// Helpers
// ──────────────────────────────────────────────

function apiBase() {
  const v = document.getElementById('api-base').value.trim();
  return v || window.location.origin;
}

function setLoading(btnId, yes) {
  const btn = document.getElementById(btnId);
  if (yes) {
    btn._orig = btn.innerHTML;
    btn.innerHTML = '<div class="spinner"></div> Working…';
    btn.disabled = true;
  } else {
    btn.innerHTML = btn._orig || btn.innerHTML;
    btn.disabled = false;
  }
}

function showResult(id, html) {
  const el = document.getElementById(id);
  el.innerHTML = html;
  el.classList.add('visible');
}

function confColor(c) {
  if (c >= 0.75) return 'var(--success)';
  if (c >= 0.45) return 'var(--warn)';
  return 'var(--error)';
}

function confClass(c) {
  if (c >= 0.75) return 'green';
  if (c >= 0.45) return 'amber';
  return 'red';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function qualityClass(q) {
  if (q === 'good') return 'quality-good';
  if (q === 'poor') return 'quality-poor';
  return 'quality-unusable';
}

// ──────────────────────────────────────────────
// Health check
// ──────────────────────────────────────────────

async function checkHealth() {
  const dot = document.getElementById('health-dot');
  const txt = document.getElementById('health-text');
  dot.className = '';
  txt.textContent = 'checking…';
  try {
    const r = await fetch(apiBase() + '/health');
    const d = await r.json();
    dot.className = 'ok';
    txt.textContent = `v${d.version} — ok`;
  } catch(e) {
    dot.className = 'err';
    txt.textContent = 'unreachable';
  }
}

// Auto-detect API base from current origin or localhost
(function initApiBase() {
  const stored = localStorage.getItem('carlover-api-base');
  const input = document.getElementById('api-base');
  if (stored) {
    input.value = stored;
  } else if (window.location.hostname !== '' && window.location.origin !== 'null') {
    input.value = window.location.origin;
  } else {
    input.value = 'http://localhost:8000';
  }
  input.addEventListener('change', () => {
    localStorage.setItem('carlover-api-base', input.value.trim());
  });
  checkHealth();
})();

// ──────────────────────────────────────────────
// Tab switching
// ──────────────────────────────────────────────

let _activeTab = { chat: 'basic' };

function switchTab(card, tab) {
  _activeTab[card] = tab;
  const container = document.querySelector(`#chat-tab-${tab}`).closest('.card');
  container.querySelectorAll('.tab').forEach((el, i) => {
    const tabs = ['basic','vehicle','image'];
    el.classList.toggle('active', tabs[i] === tab);
  });
  container.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.getElementById(`chat-tab-${tab}`).classList.add('active');
}

// ──────────────────────────────────────────────
// Chat
// ──────────────────────────────────────────────

async function sendChat() {
  const tab = _activeTab.chat || 'basic';
  let query = '';
  let body = {};

  if (tab === 'basic') {
    query = document.getElementById('chat-query').value.trim();
  } else if (tab === 'vehicle') {
    query = document.getElementById('chat-query-v').value.trim();
    const make = document.getElementById('v-make').value.trim();
    const model = document.getElementById('v-model').value.trim();
    const year = parseInt(document.getElementById('v-year').value);
    const variant = document.getElementById('v-variant').value.trim();
    if (make || model) {
      body.vehicle = { make, model, year: isNaN(year) ? null : year, variant: variant || null };
    }
  } else if (tab === 'image') {
    query = document.getElementById('chat-query-i').value.trim();
    const imgUrl = document.getElementById('chat-image-url').value.trim();
    if (imgUrl) body.image_url = imgUrl;
  }

  if (!query) { alert('Please enter a query.'); return; }
  body.query = query;

  setLoading('chat-btn', true);
  try {
    const r = await fetch(apiBase() + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    showResult('chat-result', renderChatResult(d));
  } catch(e) {
    showResult('chat-result', `<div class="badge red">Error: ${escHtml(e.message)}</div>`);
  } finally {
    setLoading('chat-btn', false);
  }
}

function renderChatResult(d) {
  const c = d.confidence || 0;
  let html = '';

  // Answer
  html += `<div class="answer-box">${escHtml(d.answer || '(no answer)')}</div>`;

  // Meta badges
  html += `<div class="meta-row">`;
  html += `<span class="badge ${confClass(c)}">confidence ${Math.round(c * 100)}%</span>`;
  if (d.elapsed_ms) html += `<span class="badge">${Math.round(d.elapsed_ms)}ms</span>`;
  if (d.used_agents?.length) html += `<span class="badge">${d.used_agents.join(', ')}</span>`;
  if (d.needs_clarification) html += `<span class="badge amber">needs clarification</span>`;
  html += `</div>`;

  // Confidence bar
  html += `<div class="conf-bar"><div class="conf-fill" style="width:${Math.round(c*100)}%;background:${confColor(c)}"></div></div>`;

  // Clarification
  if (d.clarification_questions?.length) {
    html += `<div class="section-title">Clarification questions</div>`;
    html += `<div class="clarification-box">`;
    d.clarification_questions.forEach(q => { html += `• ${escHtml(q)}<br>`; });
    html += `</div>`;
  }

  // Sources
  if (d.sources?.length) {
    html += `<div class="section-title">Sources</div>`;
    html += `<div class="sources-list">`;
    d.sources.forEach(s => {
      html += `<div class="source-item">
        <span class="badge">${escHtml(s.type || '?')}</span>
        ${escHtml(s.label || '')}
        ${s.confidence != null ? `<span style="color:var(--muted);margin-left:auto">${Math.round((s.confidence||0)*100)}%</span>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  // Uncertainty
  if (d.uncertainty_notes?.length) {
    html += `<div class="section-title">Uncertainty notes</div>`;
    d.uncertainty_notes.forEach(n => {
      html += `<div class="badge amber" style="display:block;margin-top:4px">${escHtml(n)}</div>`;
    });
  }

  // Raw JSON
  html += `<details><summary>Raw JSON</summary><div class="raw-json">${escHtml(JSON.stringify(d, null, 2))}</div></details>`;

  return html;
}

// ──────────────────────────────────────────────
// Vehicle Lookup
// ──────────────────────────────────────────────

async function sendVehicleLookup() {
  const make = document.getElementById('vl-make').value.trim();
  const model = document.getElementById('vl-model').value.trim();
  const yearRaw = document.getElementById('vl-year').value.trim();
  const year = yearRaw ? parseInt(yearRaw) : null;

  if (!model) { alert('Please enter a model name.'); return; }

  const body = { model };
  if (make) body.make = make;
  if (year && !isNaN(year)) body.year = year;

  setLoading('vl-btn', true);
  try {
    const r = await fetch(apiBase() + '/vehicle/lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    showResult('vl-result', renderVehicleLookup(d));
  } catch(e) {
    showResult('vl-result', `<div class="badge red">Error: ${escHtml(e.message)}</div>`);
  } finally {
    setLoading('vl-btn', false);
  }
}

function renderVehicleLookup(d) {
  let html = '';

  // Header: normalized name + found badge
  const name = [d.normalized_make, d.normalized_model, d.year].filter(Boolean).join(' ');
  html += `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">`;
  html += `<span style="font-size:15px;font-weight:700;">${escHtml(name)}</span>`;
  html += `<span class="badge ${d.found ? 'green' : 'red'}">${d.found ? 'found in ADAC' : 'not found'}</span>`;
  if (d.elapsed_ms) html += `<span class="badge" style="margin-left:auto">${Math.round(d.elapsed_ms)}ms</span>`;
  html += `</div>`;

  // Corrections applied
  if (d.corrections?.length) {
    html += `<div style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.25);border-radius:6px;padding:8px 12px;margin-bottom:8px;">`;
    html += `<div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:4px;">Corrections applied</div>`;
    d.corrections.forEach(c => { html += `<div style="font-size:12px;color:var(--muted);">• ${escHtml(c)}</div>`; });
    html += `</div>`;
  }

  if (!d.found) {
    html += `<div class="badge amber" style="display:block">No ADAC data found for this vehicle.</div>`;
    html += `<details><summary>Raw JSON</summary><div class="raw-json">${escHtml(JSON.stringify(d, null, 2))}</div></details>`;
    return html;
  }

  // Vehicle info
  if (d.vehicle_info) {
    const vi = d.vehicle_info;

    // Description
    if (vi.description) {
      html += `<div class="section-title">Description</div>`;
      html += `<div style="font-size:12px;color:var(--text);line-height:1.6;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;">${escHtml(vi.description)}</div>`;
    }

    // Generations
    if (vi.generations?.length) {
      html += `<div class="section-title">Generations (${vi.generations.length})</div>`;
      html += `<div style="display:flex;flex-wrap:wrap;gap:6px;">`;
      vi.generations.forEach(g => {
        const range = [g.year_from, g.year_to || 'present'].filter(Boolean).join(' – ');
        html += `<div class="badge">${escHtml(g.name || '?')} <span style="color:var(--muted);margin-left:4px">${range}</span></div>`;
      });
      html += `</div>`;
    }

    // Reliability by year — mini bar chart
    if (vi.reliability_by_year?.length) {
      const mileage = vi.reliability_by_year[0]?.annual_mileage_km;
      const mileageNote = mileage ? ` · mileage assumption: ${mileage.toLocaleString()} km/yr` : '';
      html += `<div class="section-title">Reliability by year (ADAC Pannenstatistik${mileageNote})</div>`;
      const maxVal = Math.max(...vi.reliability_by_year.map(r => r.breakdowns_per_1000), 1);
      html += `<div style="display:flex;flex-direction:column;gap:6px;">`;
      vi.reliability_by_year.forEach(r => {
        const pct = Math.round((r.breakdowns_per_1000 / maxVal) * 100);
        const score = r.rating_score;
        const col = score >= 0.75 ? 'var(--success)' : score >= 0.45 ? 'var(--warn)' : 'var(--error)';

        // Class threshold label (e.g. "class ≤2.0 for gut")
        let thresholdLabel = '';
        if (r.class_thresholds) {
          const ct = r.class_thresholds;
          const val = r.breakdowns_per_1000;
          // Show the threshold boundary they fall at
          let boundary, label;
          if (val <= ct.sehr_gut) { boundary = ct.sehr_gut; label = 'sehr gut'; }
          else if (val <= ct.gut) { boundary = ct.gut; label = 'gut'; }
          else if (val <= ct.befriedigend) { boundary = ct.befriedigend; label = 'befriedigend'; }
          else if (val <= ct.ausreichend) { boundary = ct.ausreichend; label = 'ausreichend'; }
          else { boundary = ct.ausreichend; label = 'mangelhaft'; }
          thresholdLabel = ` <span style="color:var(--muted)">class ≤${boundary} for ${label}</span>`;
        }

        const genLabel = r.generation_name ? `<span style="color:var(--muted);font-size:10px;margin-left:2px;">${escHtml(r.generation_name)}</span>` : '';

        html += `<div style="display:flex;flex-direction:column;gap:2px;">
          <div style="display:flex;align-items:center;gap:8px;font-size:11px;">
            <span style="width:32px;color:var(--muted);flex-shrink:0">${r.year}</span>
            <div style="flex:1;background:var(--border);border-radius:2px;height:6px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:${col};border-radius:2px;transition:width 0.3s"></div>
            </div>
            <span style="color:${col};flex-shrink:0;font-weight:600">${r.breakdowns_per_1000}/1000 — ${escHtml(r.rating)}</span>
            ${thresholdLabel}
          </div>
          ${genLabel ? `<div style="padding-left:40px;">${genLabel}</div>` : ''}
        </div>`;
      });
      html += `</div>`;
    }
  }

  // Issue patterns
  if (d.issue_patterns?.length) {
    html += `<div class="section-title">Breakdown patterns (${d.issue_patterns.length})</div>`;
    d.issue_patterns.forEach(p => {
      html += `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-top:6px;">`;
      html += `<div style="font-weight:600;font-size:12px;margin-bottom:4px;">${escHtml(p.pattern_name || '')}`;
      if (p.affected_years) html += ` <span style="color:var(--muted);font-weight:400">(${escHtml(p.affected_years)})</span>`;
      html += `</div>`;
      if (p.symptoms?.length) {
        html += `<div style="font-size:11px;color:var(--muted);">${p.symptoms.map(s => escHtml(s)).join('<br>')}</div>`;
      }
      if (p.root_cause) html += `<div style="font-size:11px;color:var(--warn);margin-top:3px;">Cause: ${escHtml(p.root_cause)}</div>`;
      if (p.solution) html += `<div style="font-size:11px;color:var(--success);margin-top:2px;">→ ${escHtml(p.solution)}</div>`;
      html += `</div>`;
    });
  }

  html += `<details><summary>Raw JSON</summary><div class="raw-json">${escHtml(JSON.stringify(d, null, 2))}</div></details>`;
  return html;
}

// ──────────────────────────────────────────────
// Image Analysis
// ──────────────────────────────────────────────

let _fileDataUrl = null;

function clearFileSelection() {
  _fileDataUrl = null;
  document.getElementById('file-name').style.display = 'none';
  document.getElementById('img-preview').classList.remove('visible');
  document.getElementById('img-preview').src = '';
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  loadFile(file);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    _fileDataUrl = ev.target.result;
    document.getElementById('file-thumb').src = _fileDataUrl;
    document.getElementById('file-label').textContent = file.name;
    document.getElementById('file-name').style.display = 'flex';
    document.getElementById('img-url').value = '';
    // Large preview
    document.getElementById('img-preview').src = _fileDataUrl;
    document.getElementById('img-preview').classList.add('visible');
  };
  reader.readAsDataURL(file);
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}

function handleDragLeave(e) {
  document.getElementById('drop-zone').classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
}

// Show URL preview when URL changes
document.getElementById('img-url').addEventListener('input', function() {
  const url = this.value.trim();
  const preview = document.getElementById('img-preview');
  if (url) {
    preview.src = url;
    preview.classList.add('visible');
    clearFileSelection();
    _fileDataUrl = null; // URL takes precedence
  } else {
    preview.classList.remove('visible');
    preview.src = '';
  }
});

async function sendImageAnalysis() {
  const urlField = document.getElementById('img-url').value.trim();
  const context = document.getElementById('img-context').value.trim();

  const formData = new FormData();
  if (context) formData.append('context', context);

  if (_fileDataUrl) {
    // Convert data URL → Blob for upload
    const res = await fetch(_fileDataUrl);
    const blob = await res.blob();
    formData.append('image', blob, 'upload.jpg');
  } else if (urlField) {
    formData.append('image_url', urlField);
  } else {
    alert('Please select an image file or enter an image URL.');
    return;
  }

  setLoading('img-btn', true);
  try {
    const r = await fetch(apiBase() + '/image/analyze', {
      method: 'POST',
      body: formData,
    });
    const d = await r.json();
    showResult('img-result', renderImageResult(d));
  } catch(e) {
    showResult('img-result', `<div class="badge red">Error: ${escHtml(e.message)}</div>`);
  } finally {
    setLoading('img-btn', false);
  }
}

function renderImageResult(d) {
  const c = d.confidence || 0;
  let html = '';

  // Status badges
  html += `<div class="meta-row">`;
  html += `<span class="badge ${confClass(c)}">confidence ${Math.round(c * 100)}%</span>`;

  const q = d.image_quality || 'good';
  html += `<span class="quality-badge ${qualityClass(q)}">quality: ${escHtml(q)}</span>`;

  if (d.vehicle_detected === false) html += `<span class="badge red">no vehicle detected</span>`;
  else if (d.vehicle_count > 1) html += `<span class="badge amber">${d.vehicle_count} vehicles</span>`;
  else if (d.vehicle_count === 1) html += `<span class="badge green">1 vehicle</span>`;

  if (d.damage_detected) html += `<span class="badge red">damage detected</span>`;
  if (d.elapsed_ms) html += `<span class="badge">${Math.round(d.elapsed_ms)}ms</span>`;
  html += `</div>`;

  // Confidence bar
  html += `<div class="conf-bar"><div class="conf-fill" style="width:${Math.round(c*100)}%;background:${confColor(c)}"></div></div>`;

  // Clarification
  if (d.clarification_questions?.length) {
    html += `<div class="section-title">Clarification needed</div>`;
    html += `<div class="clarification-box">`;
    d.clarification_questions.forEach(q => { html += `• ${escHtml(q)}<br>`; });
    html += `</div>`;
  }

  // Warning lights
  if (d.warning_lights_detected?.length) {
    html += `<div class="section-title">Warning lights</div>`;
    html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">`;
    d.warning_lights_detected.forEach(w => { html += `<span class="warning-light-pill">⚠ ${escHtml(w)}</span>`; });
    html += `</div>`;
  }

  // Observations
  if (d.observations?.length) {
    html += `<div class="section-title">Observations</div>`;
    html += `<div class="observations-list">`;
    d.observations.forEach(o => { html += `<div style="font-size:12px;color:var(--text)">• ${escHtml(o)}</div>`; });
    html += `</div>`;
  }

  // Possible findings
  if (d.possible_findings?.length) {
    html += `<div class="section-title">Possible findings</div>`;
    html += `<div class="findings-list">`;
    d.possible_findings.forEach(f => { html += `<div style="font-size:12px;color:var(--muted)">→ ${escHtml(f)}</div>`; });
    html += `</div>`;
  }

  // Limitations
  if (d.limitations?.length) {
    html += `<div class="section-title">Limitations</div>`;
    d.limitations.forEach(l => { html += `<div class="badge amber" style="display:block;margin-top:4px">${escHtml(l)}</div>`; });
  }

  // ADAC enrichment
  if (d.detected_make || d.detected_model) {
    html += `<div class="section-title">Identified vehicle</div>`;
    html += `<div class="badge green">${escHtml([d.detected_make, d.detected_model].filter(Boolean).join(' '))}</div>`;
  }
  if (d.adac_summary) {
    html += `<div class="section-title">ADAC — Known issues</div>`;
    html += `<div style="font-size:12px;color:var(--text);line-height:1.6;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;">${escHtml(d.adac_summary)}</div>`;
  }
  if (d.adac_issue_patterns?.length) {
    html += `<div class="section-title">ADAC — Breakdown patterns</div>`;
    d.adac_issue_patterns.forEach(p => {
      html += `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-top:6px;">`;
      html += `<div style="font-weight:600;font-size:12px;margin-bottom:4px;">${escHtml(p.pattern_name || '')}</div>`;
      if (p.symptoms?.length) html += `<div style="font-size:11px;color:var(--muted);">${p.symptoms.map(s => escHtml(s)).join(' • ')}</div>`;
      if (p.solution) html += `<div style="font-size:11px;color:var(--success);margin-top:3px;">→ ${escHtml(p.solution)}</div>`;
      html += `</div>`;
    });
  }

  // Raw JSON
  html += `<details><summary>Raw JSON</summary><div class="raw-json">${escHtml(JSON.stringify(d, null, 2))}</div></details>`;

  return html;
}
