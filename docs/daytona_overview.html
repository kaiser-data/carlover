<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carlover — Daytona</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #07091

2;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .slide {
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── Loveable App (top) ── */
  .app-node {
    background: linear-gradient(135deg, #1a0e2e, #1e1030);
    border: 2px solid #f472b6;
    border-radius: 20px;
    padding: 20px 44px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 0 40px rgba(244,114,182,0.2);
  }
  .app-node .big-icon { font-size: 36px; }
  .app-node .label    { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .app-node .sub      { font-size: 12px; font-weight: 500; color: #f9a8d4; margin-top: 2px; }

  /* ── Arrow ── */
  .arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2px 0;
  }
  .arrow-shaft {
    width: 2px;
    height: 36px;
    background: linear-gradient(to bottom, #6366f1aa, #6366f1);
  }
  .arrow-tip {
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 10px solid #6366f1;
  }
  .arrow-tag {
    font-size: 11px;
    font-weight: 600;
    color: #818cf8;
    margin-top: 5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── Daytona box ── */
  .daytona {
    width: 100%;
    background: linear-gradient(150deg, #0d1330 0%, #080c1e 100%);
    border: 2px solid #6366f1;
    border-radius: 28px;
    padding: 36px 32px 32px;
    box-shadow:
      0 0 0 1px rgba(99,102,241,0.15),
      0 40px 100px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }
  .daytona-label {
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
    background: #6366f1;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 20px;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(99,102,241,0.5);
    white-space: nowrap;
  }

  .parallel-hint {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #2d3a5a;
    margin-bottom: 22px;
  }

  /* ── Agent cards ── */
  .agents {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .agent {
    border-radius: 18px;
    padding: 22px 14px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    border: 1.5px solid var(--c-dim);
    background: var(--c-bg);
  }
  .agent .a-icon { font-size: 36px; line-height: 1; }
  .agent .a-name {
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }
  .agent .a-tag  {
    font-size: 11px;
    font-weight: 600;
    color: var(--c);
    background: var(--c-dim);
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
  }

  .agent-adac    { --c: #fbbf24; --c-bg: rgba(251,191,36,0.06); --c-dim: rgba(251,191,36,0.2); }
  .agent-db      { --c: #34d399; --c-bg: rgba(52,211,153,0.06); --c-dim: rgba(52,211,153,0.2); }
  .agent-image   { --c: #38bdf8; --c-bg: rgba(56,189,248,0.06); --c-dim: rgba(56,189,248,0.2); }
  .agent-sandbox { --c: #c084fc; --c-bg: rgba(192,132,252,0.06); --c-dim: rgba(192,132,252,0.2); }

  /* ── Return arrow ── */
  .arrow-up .arrow-shaft {
    background: linear-gradient(to bottom, #22c55e, #22c55eaa);
  }
  .arrow-up .arrow-tip {
    border-top-color: #22c55e;
  }
  .arrow-up .arrow-tag { color: #4ade80; }

  /* ── Data sources ── */
  .sources {
    display: flex;
    gap: 10px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 24px;
  }
  .source {
    background: #0d1020;
    border: 1px solid #1e2640;
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
  }
  .source .s-icon { font-size: 16px; }

  @media (max-width: 600px) {
    .agents { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="slide">

  <!-- Loveable App -->
  <div class="app-node">
    <div class="big-icon">🚗</div>
    <div>
      <div class="label">Carlover App</div>
      <div class="sub">Built with Loveable</div>
    </div>
  </div>

  <!-- Down arrow -->
  <div class="arrow">
    <div class="arrow-shaft"></div>
    <div class="arrow-tip"></div>
    <div class="arrow-tag">Question</div>
  </div>

  <!-- Daytona -->
  <div class="daytona">
    <div class="daytona-label">☁️ &nbsp;Daytona Sandbox</div>
    <div class="parallel-hint">4 agents · running in parallel</div>

    <div class="agents">
      <div class="agent agent-adac">
        <div class="a-icon">📊</div>
        <div class="a-name">ADAC<br>Agent</div>
        <div class="a-tag">Reliability</div>
      </div>
      <div class="agent agent-db">
        <div class="a-icon">🗄️</div>
        <div class="a-name">Database<br>Agent</div>
        <div class="a-tag">History</div>
      </div>
      <div class="agent agent-image">
        <div class="a-icon">📷</div>
        <div class="a-name">Image<br>Agent</div>
        <div class="a-tag">Vision</div>
      </div>
      <div class="agent agent-sandbox">
        <div class="a-icon">🔧</div>
        <div class="a-name">Sandbox<br>Agent</div>
        <div class="a-tag">Diagnostics</div>
      </div>
    </div>

    <!-- Data sources inside the box -->
    <div class="sources">
      <div class="source"><span class="s-icon">🏎️</span> ADAC.de</div>
      <div class="source"><span class="s-icon">🧬</span> Qwen3 AI</div>
      <div class="source"><span class="s-icon">🗃️</span> Supabase</div>
      <div class="source"><span class="s-icon">⚡</span> Daytona API</div>
    </div>
  </div>

  <!-- Up arrow -->
  <div class="arrow arrow-up">
    <div class="arrow-shaft"></div>
    <div class="arrow-tip"></div>
    <div class="arrow-tag">Answer</div>
  </div>

  <!-- Loveable App (bottom) -->
  <div class="app-node">
    <div class="big-icon">✅</div>
    <div>
      <div class="label">Carlover App</div>
      <div class="sub">Displays result to user</div>
    </div>
  </div>

</div>
</body>
</html>
